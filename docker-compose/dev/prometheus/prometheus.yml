global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['gateway:8072']

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['user-service:3001']

  - job_name: formula-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['formula-service:3002']

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['payment-service:3003']

  - job_name: notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-service:3004']

  - job_name: config-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['config-server:8071']

  - job_name: eureka-server
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['eureka-server:8070']
